<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deck 4_1 · Módulo 4 · Clase 1 · Curso de Web Hacking</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #161b28;
            --border: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --accent-cyan: #06b6d4;
            --accent-fuchsia: #d946ef;
            --accent-lime: #84cc16;
            --accent-yellow: #eab308;
            --accent-rose: #f43f5e;
            --accent-emerald: #10b981;
        }

        body.light-mode {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --border: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
        }

        body.light-mode .bg-grid path { stroke: #cbd5e1; }

        body {
            background: var(--bg-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: var(--text-primary);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            user-select: none;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }

        .presentation {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .slide {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 80px 100px;
            opacity: 0;
            visibility: hidden;
            transform: translateX(80px);
            transition: opacity 0.5s ease, transform 0.5s ease, visibility 0s 0.5s;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
            background: var(--bg-primary);
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
            transform: translateX(0);
            pointer-events: auto;
            z-index: 2;
            transition: opacity 0.5s ease, transform 0.5s ease, visibility 0s 0s;
        }

        .slide.to-left {
            opacity: 0;
            transform: translateX(-80px);
            visibility: hidden;
            z-index: 0;
        }

        .slide.spotlight-slide {
            overflow: hidden;
            isolation: isolate;
        }

        .slide.spotlight-slide::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(circle at 84% 14%, rgba(132, 204, 22, 0.12), transparent 32%),
                radial-gradient(circle at 16% 82%, rgba(6, 182, 212, 0.1), transparent 36%);
        }

        .slide.spotlight-slide::after {
            content: '';
            position: absolute;
            inset: -10% -6%;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(circle at 72% 22%, rgba(217, 70, 239, 0.08), transparent 22%),
                radial-gradient(circle at 28% 76%, rgba(6, 182, 212, 0.06), transparent 26%);
            filter: blur(26px);
            opacity: 0.9;
        }

        .slide.spotlight-slide > * {
            position: relative;
            z-index: 1;
        }

        .slide-title,
        .slide-content {
            max-width: 1240px;
            width: 100%;
            max-height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .slide-content::-webkit-scrollbar,
        .slide-title::-webkit-scrollbar {
            width: 8px;
        }
        .slide-content::-webkit-scrollbar-thumb,
        .slide-title::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        /* Prevenir overflow horizontal en elementos internos */
        .slide-content > *,
        .slide-title > * {
            max-width: 100%;
            overflow-wrap: break-word;
            word-wrap: break-word;
        }

        .slide-content pre,
        .slide-content .code-shell,
        .slide-content .table-shell {
            overflow-x: auto;
            max-width: 100%;
        }

        .slide-content .slide-image {
            margin: 1.5rem 0;
        }

        .slide-title { text-align: center; }

        .slide-title h1,
        .slide-content h1 {
            font-size: clamp(42px, 5vw, 72px);
            font-weight: 800;
            line-height: 1.08;
            letter-spacing: -1px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-fuchsia));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .slide-title h2,
        .slide-content h2 {
            font-size: clamp(30px, 4vw, 52px);
            font-weight: 700;
            margin-bottom: 36px;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .slide-title h3,
        .slide-content h3 {
            font-size: clamp(20px, 2.2vw, 28px);
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--text-secondary);
        }

        .slide-content h4 {
            font-size: 18px;
            font-weight: 700;
            margin: 24px 0 12px;
            color: var(--accent-cyan);
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .eyebrow {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            margin-bottom: 24px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent-cyan);
            background: rgba(6, 182, 212, 0.08);
            border: 1px solid rgba(6, 182, 212, 0.24);
        }

        .lead,
        .slide-content p,
        .slide-title p,
        .blockquote {
            font-size: clamp(18px, 1.8vw, 24px);
            line-height: 1.7;
            color: var(--text-secondary);
            margin-bottom: 18px;
        }

        .slide-content p strong,
        .slide-title p strong,
        .blockquote strong,
        li strong,
        td strong {
            color: var(--text-primary);
            transition: all 0.1s ease-out;
            cursor: default;
            position: relative;
            padding: 2px 6px;
            margin: 0 -6px;
            border-radius: 6px;
        }

        /* Hover effect en negritas */
        .slide-content strong:hover,
        .slide-title strong:hover,
        li strong:hover,
        td strong:hover {
            color: var(--accent-cyan);
            background: rgba(6, 182, 212, 0.15);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.12);
            transform: scale(1.05);
        }

        body.light-mode .slide-content strong:hover,
        body.light-mode .slide-title strong:hover,
        body.light-mode li strong:hover {
            background: rgba(6, 182, 212, 0.12);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.08);
        }

        .blockquote {
            margin-top: 18px;
            padding: 22px 24px;
            border-radius: 16px;
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.54), rgba(15, 23, 42, 0.72));
            border: 1px solid rgba(148, 163, 184, 0.18);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 18px 40px rgba(0, 0, 0, 0.18);
        }

        body.light-mode .blockquote {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.8), rgba(248, 250, 252, 0.74));
            border: 1px solid rgba(148, 163, 184, 0.26);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9), 0 16px 30px rgba(15, 23, 42, 0.06);
        }

        .slide-content ul,
        .slide-content ol,
        .slide-title ul,
        .slide-title ol {
            padding: 0;
            margin: 10px 0 20px;
            list-style: none;
        }

        .slide-content li,
        .slide-title li {
            font-size: clamp(16px, 1.6vw, 22px);
            line-height: 1.65;
            color: var(--text-secondary);
            padding: 10px 16px 10px 40px;
            margin: 4px 0;
            position: relative;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 10px;
            cursor: default;
        }

        /* Hover effect en items de lista */
        .slide.active li:hover {
            background: rgba(6, 182, 212, 0.08);
            color: var(--text-primary);
            transform: translateX(0) scale(1.01);
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.15);
            padding-left: 46px;
            transition: all 0.15s ease-out;
        }

        .slide.active li:hover::before {
            color: var(--accent-fuchsia);
            transform: scale(1.3);
            transition: all 0.1s ease-out;
        }

        body.light-mode .slide.active li:hover {
            background: rgba(6, 182, 212, 0.06);
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.08);
        }

        .slide-content li::before,
        .slide-title li::before {
            content: '▹';
            position: absolute;
            left: 12px;
            color: var(--accent-cyan);
            font-size: 24px;
            top: 8px;
        }

        .slide-content ol { counter-reset: item; }
        .slide-content ol li::before,
        .slide-title ol li::before {
            counter-increment: item;
            content: counter(item);
            width: 24px;
            height: 24px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 800;
            background: rgba(6, 182, 212, 0.18);
            left: 8px;
            top: 12px;
        }

        .slide.active li,
        .slide.active .table-shell,
        .slide.active .code-shell,
        .slide.active .qa-accordion,
        .slide.active .callout-card,
        .slide.active .meta-chip,
        .slide.active .divider-banner {
            opacity: 1;
            transform: translateX(0) translateY(0) scale(1);
        }

        .slide.active li:nth-child(1),
        .slide.active .callout-card:nth-child(1),
        .slide.active .meta-chip:nth-child(1) { transition-delay: 0.08s; }
        .slide.active li:nth-child(2),
        .slide.active .callout-card:nth-child(2),
        .slide.active .meta-chip:nth-child(2) { transition-delay: 0.16s; }
        .slide.active li:nth-child(3),
        .slide.active .callout-card:nth-child(3),
        .slide.active .meta-chip:nth-child(3) { transition-delay: 0.24s; }
        .slide.active li:nth-child(4),
        .slide.active .callout-card:nth-child(4),
        .slide.active .meta-chip:nth-child(4) { transition-delay: 0.32s; }
        .slide.active li:nth-child(5) { transition-delay: 0.4s; }

        .table-shell,
        .code-shell,
        .qa-accordion,
        .callout-card,
        .divider-banner,
        .meta-chip {
            opacity: 0;
            transform: translateY(18px);
            transition: all 0.45s ease;
        }

        .table-shell,
        .code-shell,
        .qa-accordion,
        .callout-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            margin: 24px 0;
            box-shadow: 0 16px 34px rgba(2, 6, 23, 0.18);
        }

        .table-shell::before,
        .code-shell::before,
        .qa-accordion::before,
        .callout-card::before {
            content: '';
            display: block;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-fuchsia));
        }

        .qa-accordion {
            margin: 24px 0;
            padding: 8px 14px 14px;
        }

        .qa-item {
            border-bottom: 1px solid rgba(148, 163, 184, 0.12);
        }

        .qa-item:last-child {
            border-bottom: 0;
        }

        .qa-item summary {
            list-style: none;
            cursor: pointer;
            padding: 18px 42px 18px 10px;
            position: relative;
            color: var(--text-primary);
            font-size: clamp(18px, 1.6vw, 23px);
            font-weight: 700;
            line-height: 1.4;
        }

        .qa-item summary::-webkit-details-marker {
            display: none;
        }

        .qa-item summary::after {
            content: '+';
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-cyan);
            font-size: 28px;
            font-weight: 500;
        }

        .qa-item[open] summary::after {
            content: '−';
        }

        .qa-item summary:hover {
            color: var(--accent-cyan);
        }

        .qa-answer {
            padding: 0 10px 18px 10px;
        }

        .qa-answer p {
            margin: 0 0 10px;
            font-size: clamp(16px, 1.45vw, 21px);
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .qa-answer p:last-child {
            margin-bottom: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 16px 18px;
            text-align: left;
            border-bottom: 1px solid rgba(148, 163, 184, 0.12);
            vertical-align: top;
            transition: all 0.12s ease-out;
        }

        /* Hover effect en filas de tabla */
        tbody tr:hover td {
            background: rgba(6, 182, 212, 0.05);
            color: var(--text-primary);
        }

        tbody tr:hover td:first-child {
            color: var(--accent-cyan);
            transform: translateX(4px);
        }

        body.light-mode tbody tr:hover td {
            background: rgba(6, 182, 212, 0.04);
        }

        th {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--text-muted);
            background: rgba(15, 23, 42, 0.42);
        }

        td {
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        td:first-child { color: var(--text-primary); font-weight: 700; }

        .ssdlc-shell {
            position: relative;
            margin: 24px 0 18px;
            padding: 22px 20px 10px;
            border-radius: 24px;
            background:
                radial-gradient(circle at 12% 18%, rgba(6, 182, 212, 0.12), transparent 26%),
                radial-gradient(circle at 88% 16%, rgba(217, 70, 239, 0.12), transparent 24%),
                linear-gradient(180deg, rgba(15, 23, 42, 0.92), rgba(15, 23, 42, 0.74));
            border: 1px solid rgba(148, 163, 184, 0.18);
            box-shadow: 0 18px 42px rgba(2, 6, 23, 0.24);
            opacity: 0;
            transform: translateY(18px);
            transition: all 0.45s ease;
            overflow: hidden;
        }

        .slide.active .ssdlc-shell {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.22s;
        }

        .ssdlc-shell::before {
            content: '';
            position: absolute;
            inset: 0 0 auto;
            height: 4px;
            background: linear-gradient(90deg, #f97316, #facc15, #06b6d4);
        }

        .ssdlc-top-grid,
        .ssdlc-activity-grid,
        .ssdlc-lifecycle-grid {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 14px;
            align-items: start;
        }

        .ssdlc-top-grid {
            margin-bottom: 18px;
        }

        .ssdlc-top-card {
            position: relative;
            min-height: 96px;
            padding: 18px 20px;
            border-radius: 22px;
            background: linear-gradient(180deg, rgba(248, 250, 252, 0.94), rgba(226, 232, 240, 0.88));
            color: #111827;
            font-size: 22px;
            font-weight: 800;
            line-height: 1.15;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 14px 26px rgba(15, 23, 42, 0.18);
        }

        .ssdlc-top-card.risk {
            grid-column: 1 / span 2;
        }

        .ssdlc-top-card.vuln {
            grid-column: 4 / span 2;
        }

        .ssdlc-drop {
            position: absolute;
            bottom: -56px;
            width: 2px;
            height: 42px;
            background: rgba(226, 232, 240, 0.92);
        }

        .ssdlc-drop::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            width: 10px;
            height: 10px;
            transform: translateX(-50%);
            border-radius: 999px;
            background: #111827;
            box-shadow: 0 0 0 2px rgba(248, 250, 252, 0.72);
        }

        .ssdlc-top-card.risk .ssdlc-drop.left { left: 28%; }
        .ssdlc-top-card.risk .ssdlc-drop.right { right: 24%; }
        .ssdlc-top-card.vuln .ssdlc-drop.center { left: 50%; transform: translateX(-50%); }

        .ssdlc-activity-grid {
            margin-bottom: 8px;
        }

        .ssdlc-activity,
        .ssdlc-lifecycle-stage {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ssdlc-pillar {
            width: 2px;
            height: 42px;
            background: rgba(226, 232, 240, 0.85);
            margin-bottom: 10px;
            position: relative;
        }

        .ssdlc-pillar::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            width: 9px;
            height: 9px;
            transform: translateX(-50%);
            border-radius: 999px;
            background: #111827;
            box-shadow: 0 0 0 2px rgba(248, 250, 252, 0.72);
        }

        .ssdlc-badge {
            width: 100%;
            min-height: 92px;
            padding: 16px 14px;
            border-radius: 18px;
            background: linear-gradient(180deg, #facc15, #fbbf24);
            color: #111827;
            font-size: 16px;
            font-weight: 800;
            line-height: 1.18;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 24px rgba(251, 191, 36, 0.28);
        }

        .ssdlc-activity.span-2 {
            grid-column: span 2;
        }

        .ssdlc-activity.span-2 .ssdlc-badge {
            min-height: 84px;
            font-size: 17px;
        }

        .ssdlc-activity-connector {
            width: 2px;
            height: 36px;
            background: rgba(226, 232, 240, 0.82);
            margin: 10px 0 4px;
            position: relative;
        }

        .ssdlc-activity-connector::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            width: 9px;
            height: 9px;
            transform: translateX(-50%);
            border-radius: 999px;
            background: #111827;
            box-shadow: 0 0 0 2px rgba(248, 250, 252, 0.72);
        }

        .ssdlc-lifecycle-grid {
            align-items: center;
        }

        .ssdlc-lifecycle {
            position: relative;
            width: 148px;
            height: 148px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at center, #fde7c7 0 55%, transparent 56%),
                conic-gradient(from 270deg, #ff7a00 0 300deg, rgba(255, 122, 0, 0.18) 300deg 360deg);
            box-shadow: 0 14px 28px rgba(15, 23, 42, 0.18);
        }

        .ssdlc-lifecycle::before {
            content: '';
            position: absolute;
            inset: 10px;
            border-radius: 999px;
            background: #fde7c7;
            box-shadow: inset 0 0 0 1px rgba(255, 122, 0, 0.16);
        }

        .ssdlc-lifecycle span {
            position: relative;
            z-index: 1;
            max-width: 108px;
            text-align: center;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 0.02em;
            line-height: 1.05;
            color: #111827;
        }

        .ssdlc-lifecycle-stage[data-arrow='true'] .ssdlc-lifecycle::after {
            content: '➜';
            position: absolute;
            right: -22px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 42px;
            line-height: 1;
            color: #ff7a00;
            font-weight: 900;
            text-shadow: 0 6px 12px rgba(255, 122, 0, 0.28);
        }

        body.light-mode .ssdlc-shell {
            background:
                radial-gradient(circle at 12% 18%, rgba(6, 182, 212, 0.08), transparent 28%),
                radial-gradient(circle at 88% 16%, rgba(217, 70, 239, 0.08), transparent 24%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(248, 250, 252, 0.96));
            border-color: rgba(148, 163, 184, 0.22);
            box-shadow: 0 18px 32px rgba(15, 23, 42, 0.08);
        }

        @media (max-width: 1100px) {
            .ssdlc-shell {
                transform-origin: top center;
                scale: 0.92;
                margin: 10px -16px 0;
            }

            .slide.active .ssdlc-shell {
                transform: translateY(0) scale(0.92);
            }

            .ssdlc-top-card {
                font-size: 18px;
            }

            .ssdlc-badge {
                font-size: 14px;
                min-height: 84px;
            }

            .ssdlc-lifecycle {
                width: 128px;
                height: 128px;
            }
        }

        pre {
            padding: 20px 22px;
            overflow-x: auto;
            background: #0d1117;
            color: #9ae6b4;
            font-size: 16px;
            line-height: 1.65;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
        }

        code.inline-code {
            padding: 2px 8px;
            border-radius: 999px;
            background: rgba(6, 182, 212, 0.12);
            color: var(--accent-cyan);
            font-size: 0.9em;
            font-family: 'Courier New', monospace;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 22px 0 10px;
        }

        .meta-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 999px;
            background: rgba(6, 182, 212, 0.08);
            border: 1px solid rgba(6, 182, 212, 0.24);
            color: var(--accent-cyan);
            font-size: 14px;
            line-height: 1.3;
        }

        .divider-banner {
            width: 100%;
            padding: 28px 32px;
            border-radius: 24px;
            text-align: center;
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.16), rgba(217, 70, 239, 0.16));
            border: 1px solid rgba(6, 182, 212, 0.18);
            box-shadow: 0 22px 40px rgba(2, 6, 23, 0.16);

# APIs & Explotación Avanzada
## Módulo 4 · Clase 1

> Curso de Web Hacking
> Duración: 2 horas
> Target: Juice Shop · DVWA

---

## Agenda

- **BOLA** — Broken Object Level Authorization
- **Mass Assignment** — campos que no deberías poder enviar
- **JWT attacks** — manipular tokens de autenticación
- **File Upload → RCE** — subir código ejecutable
- **Metasploit** para web — automatizar la explotación

**Patrón de la clase:** explicar → detectar → demo en vivo

---

## El nuevo paradigma

## Las apps modernas son APIs

- El frontend es solo una interfaz sobre una API REST o GraphQL
- La autenticación viaja en tokens JWT en el header `Authorization`
- Los datos sensibles pasan por endpoints `/api/*`
- Múltiples microservicios comunicándose entre sí

> El atacante ya no hackea "la web". Hackea la API que la alimenta.

---

## Superficie de ataque de una API

| Superficie | Qué buscar |
| --- | --- |
| Endpoints `/api/*` | IDs predecibles, falta de authz |
| Tokens JWT | Algoritmo débil, secret expuesto |
| Documentación expuesta | `/api-docs`, `/swagger.json`, `/graphql` |
| CORS | Orígenes permitidos sin validar |
| Headers de respuesta | Versiones de framework, stack info |

---

## OWASP API Security Top 10

| ID | Nombre | Descripción |
| --- | --- | --- |
| **API1** | **BOLA** | Acceder a objetos de otro usuario cambiando el ID |
| API2 | Broken Authentication | Tokens débiles, sin expiración, reutilizables |
| API3 | Broken Object Property Auth | Leer/escribir propiedades restringidas |
| API4 | Unrestricted Resource Consumption | Sin rate limiting, DDoS posible |
| API5 | Broken Function Level Auth | Llamar endpoints de admin sin serlo |
| **API6** | **Mass Assignment** | El servidor acepta campos extra del cliente |
| API7 | SSRF | El servidor hace requests internos por ti |
| **API8** | **Security Misconfiguration** | Docs expuestas, CORS abierto, headers faltantes |
| API9 | Improper Inventory Management | Versiones viejas sin dar de baja |
| API10 | Unsafe Consumption of APIs | Confiar ciegamente en APIs de terceros |

---

## API1: BOLA

---

## BOLA — qué es

## Broken Object Level Authorization

- El servidor **no verifica** si el usuario tiene permiso sobre el objeto específico
- Solo valida autenticación, no qué puede ver
- El frontend muestra "tus" recursos, pero la API acepta **cualquier ID**

**Ejemplo:** logueado como usuario 42. La API acepta `GET /api/Users/1` → datos del admin.

---

## BOLA — por qué ocurre

- El developer confía en que el cliente solo manda IDs propios
- No se valida ownership: falta `WHERE id = ? AND user_id = ?`
- Los IDs son secuenciales y predecibles (1, 2, 3...)

```
Código vulnerable:
GET /api/orders/{id}
SELECT * FROM orders WHERE id = ?

Código correcto:
SELECT * FROM orders WHERE id = ? AND user_id = currentUser
```

---

## BOLA — cómo detectarlo

1. Loguearse y capturar request con ID en Burp
2. Cambiar el ID por otro valor
3. Observar si la respuesta contiene datos de otro usuario
4. Enumerar IDs: Burp Intruder con payload numérico secuencial

**Señales de alerta:**
- IDs numéricos secuenciales en la URL
- Endpoint "mi perfil" que acepta ID externo
- UUIDs pero la API responde con cualquier UUID válido

---

## Demo — BOLA en Juice Shop

```http
POST /rest/user/login
{"email":"usuario@test.com","password":"test"}

GET /api/Users/42
Authorization: Bearer <token>

GET /api/Users/1
GET /api/Users/2
GET /api/Users/3
```

Burp Intruder: payload numérico 1 a 50 para enumerar usuarios

---

## Impacto real de BOLA

- Acceso a PII de **todos** los usuarios (emails, direcciones, órdenes)
- Escalada a objetos de admin
- Filtración masiva: una vulnerabilidad, todos los registros
- **El más prevalente en APIs:** OWASP API1 desde 2019 y 2023

> BOLA representa ~40% de los reportes de bug bounty en APIs REST.

---

## API6: Mass Assignment

---

## Mass Assignment — qué es

El servidor acepta **campos extra** en el JSON que el cliente no debería poder enviar.

```json
POST /api/Users
{
  "email": "hacker@test.com",
  "password": "test123",
  "role": "admin",
  "isAdmin": true,
  "credit": 999999
}
```

Si el framework auto-bindea el body al modelo sin filtrar → **Mass Assignment**.

---

## Mass Assignment — por qué ocurre

- Frameworks modernos auto-bindean body al modelo sin configuración explícita
- El developer no define qué campos acepta cada endpoint
- Se confía en que el frontend no va a mandar esos campos

| Framework | Auto-binding | Protección |
| --- | --- | --- |
| Node.js + Mongoose | Sí | Schema estricto |
| Ruby on Rails | Sí | Strong Params |
| Spring Boot | Sí | @JsonIgnore o DTOs |
| Laravel | Sí | $fillable o $guarded |

---

## Demo — Mass Assignment en Juice Shop

```json
POST /api/Users/
{
  "email": "pwned@test.com",
  "password": "Test1234!",
  "passwordRepeat": "Test1234!",
  "role": "admin"
}
```

Juice Shop responde con role: admin.

Login → JWT con role:admin → acceso a /#/administration

---

## Defensa: DTOs y Allowlist

```javascript
// Vulnerable
const user = await User.create(req.body);

// Seguro
const { email, password } = req.body;
const user = await User.create({
  email,
  password,
  role: 'customer'  // definido por el servidor
});
```

Regla: nunca dejar que el cliente defina su propio rol, precio o permisos.

---

## JWT: Broken Authentication

---

## JWT — estructura

```
Header.Payload.Signature

Header: {"alg":"HS256","typ":"JWT"}
Payload: {"email":"user@test.com","role":"customer","exp":...}
Signature: HMAC-SHA256(header+payload, secret)
```

| Parte | Riesgo |
| --- | --- |
| Header alg | Cambiar a "none" = sin firma |
| Payload role | Modificable si no se valida la firma |
| Secret débil | Crackeable con hashcat en segundos |

Herramienta: jwt.io — decodea sin necesitar el secret

---

## JWT — ataques comunes

- **Algorithm None:** cambiar alg a none + eliminar la firma
- **Weak Secret:** si el secret es "secret" o "123456" → crackeable
- **RS256 → HS256 confusion:** usar public key como secret HMAC
- **Expiración ignorada:** reutilizar tokens vencidos

```bash
# Brute force del JWT secret
hashcat -a 0 -m 16500 token.jwt /usr/share/wordlists/rockyou.txt

# jwt_tool
python3 jwt_tool.py <token> -T
python3 jwt_tool.py <token> -X a
python3 jwt_tool.py <token> -C -d rockyou.txt
```

---

## Demo — JWT en Juice Shop

```
1. Login → copiar JWT del header Authorization

2. Decodear en jwt.io:
   Payload: {"email":"user@test.com","role":"customer"}

3. Buscar el secret:
   DevTools → Sources → Ctrl+F "secret"
   Juice Shop usa: "secret" como JWT secret

4. En jwt.io:
   → Cambiar role a "admin"
   → Pegar el secret
   → Copiar el nuevo token

5. Usar en Burp → acceso completo como admin
```

## File Upload → RCE

---

## File Upload — la vulnerabilidad

Subir archivos sin validar tipo y contenido puede llevar a **Remote Code Execution**.

Flujo del ataque:
1. Encontrar formulario de upload
2. Subir archivo .php malicioso
3. Si el servidor guarda en directorio web → RCE

```
http://victim/uploads/shell.php?cmd=whoami
http://victim/uploads/shell.php?cmd=id
```

---

## Bypasses de File Upload

| Técnica | Cómo | Cuándo funciona |
| --- | --- | --- |
| Extensión alternativa | .php5, .phtml | Solo valida extensión |
| MIME spoofing | Content-Type: image/jpeg | Solo valida MIME |
| Magic bytes | GIF89a; al inicio | Valida magic bytes |
| Null byte | shell.php%00.jpg | Lenguajes con null byte |
| Double extension | shell.jpg.php | Mala config Apache |

---

## Demo — File Upload en DVWA

```
Nivel Low:
→ Subir shell.php directamente
→ /hackable/uploads/shell.php?cmd=id

Nivel Medium (valida Content-Type):
→ Burp: cambiar Content-Type: image/jpeg

Nivel High (extensión + magic bytes):
→ Renombrar a shell.php5
→ Agregar GIF89a; al inicio del PHP
```

Target: https://dvwa.labs.manuel-roldan.cloud

        function escapeHtml(value) {
            return value
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');

        function formatInline(text) {
            let html = escapeHtml(text);
            html = html.replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>');
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
            html = html.replace(/\[([^\]]+)\]/g, '<span class="placeholder-link">$1</span>');

        function splitSections(source) {
            return source
                .split(/^---\s*$/m)
                .map((section) => section.trim())
                .filter(Boolean);

        function normalizeTitle(text) {
            return text
                .replace(/^Slide\s+\d+\s+[—-]\s+/i, '')
                .replace(/^#+\s*/, '')
                .trim();
        }

        function parseSection(section, index) {
            const lines = section.split('\n');
            const blocks = [];
            let pointer = 0;
            let slideLabel = '';

            while (pointer < lines.length) {
                const line = lines[pointer];
                const trimmed = line.trim();

                if (!trimmed) {
                    pointer += 1;
                    continue;
                }

                const headingMatch = trimmed.match(/^(#{1,6})\s+(.+)$/);
                if (headingMatch) {
                    const level = headingMatch[1].length;
                    let text = headingMatch[2].trim();
                    if (!slideLabel && level <= 2) {
                        slideLabel = normalizeTitle(text);
                        text = slideLabel;
                    }
                    blocks.push({ type: 'heading', level, text });
                    pointer += 1;
                    continue;
                }

                if (trimmed.startsWith('```')) {
                    const language = trimmed.slice(3).trim();
                    pointer += 1;
                    const codeLines = [];
                    while (pointer < lines.length && !lines[pointer].trim().startsWith('```')) {
                        codeLines.push(lines[pointer]);
                        pointer += 1;
                    }
                    pointer += 1;
                    blocks.push({ type: 'code', language, content: codeLines.join('\n') });
                    continue;
                }

                if (trimmed === '|||') {
                    blocks.push({ type: 'column-break' });
                    pointer += 1;
                    continue;
                }

                if (trimmed.startsWith('|')) {
                    const tableLines = [];
                    while (pointer < lines.length && lines[pointer].trim().startsWith('|')) {
                        tableLines.push(lines[pointer].trim());
                        pointer += 1;
                    }
                    blocks.push(parseTable(tableLines));
                    continue;
                }

                if (trimmed.startsWith('>')) {
                    const quoteLines = [];
                    while (pointer < lines.length && lines[pointer].trim().startsWith('>')) {
                        quoteLines.push(lines[pointer].trim().replace(/^>\s?/, ''));
                        pointer += 1;
                    }
                    blocks.push({ type: 'blockquote', text: quoteLines.join(' ') });
                    continue;
                }

                if (trimmed.startsWith('![')) {
                    const altEnd = trimmed.indexOf('](');
                    if (altEnd !== -1 && trimmed.endsWith(')')) {
                        const alt = trimmed.slice(2, altEnd);
                        const src = trimmed.slice(altEnd + 2, -1);
                        blocks.push({ type: 'image', alt, src });
                        pointer += 1;
                        continue;

                if (/^(?:[-*+]\s+|\d+\.\s+)/.test(trimmed)) {
                    const ordered = /^\d+\.\s+/.test(trimmed);
                    const items = [];
                    while (pointer < lines.length && /^(?:[-*+]\s+|\d+\.\s+)/.test(lines[pointer].trim())) {
                        items.push(lines[pointer].trim().replace(/^(?:[-*+]\s+|\d+\.\s+)/, ''));
                        pointer += 1;
                    }
                    blocks.push({ type: ordered ? 'ol' : 'ul', items });
                    continue;
                }

                const paragraphLines = [];
                while (pointer < lines.length) {
                    const current = lines[pointer];
                    const currentTrimmed = current.trim();
                    if (!currentTrimmed) {
                        pointer += 1;
                        break;
                    }
                    if (/^(#{1,6})\s+/.test(currentTrimmed) || currentTrimmed.startsWith('```') || currentTrimmed.startsWith('|') || currentTrimmed.startsWith('>') || currentTrimmed.startsWith('![') || /^(?:[-*+]\s+|\d+\.\s+)/.test(currentTrimmed)) {
                        break;
                    }
                    paragraphLines.push(currentTrimmed);
                    pointer += 1;

                if (paragraphLines.length) {
                    blocks.push({ type: 'paragraph', text: paragraphLines.join(' ') });
                }

            const title = slideLabel || `Slide ${index + 1}`;
            const layout = detectLayout(blocks, index);
            return { title, blocks, layout };
        }

        function parseTable(lines) {
            const rows = lines.map((line) => line.slice(1, -1).split('|').map((cell) => cell.trim()));
            const header = rows[0] || [];
            const body = rows.slice(1).filter((row) => !row.every((cell) => /^:?-{3,}:?$/.test(cell)));
            return { type: 'table', header, rows: body };
        }

        function detectLayout(blocks, index) {
            const contentTypes = new Set(blocks.map((block) => block.type));
            const onlyHeroBlocks = [...contentTypes].every((type) => ['heading', 'paragraph', 'blockquote'].includes(type));
            const headingCount = blocks.filter((block) => block.type === 'heading').length;
            if (index === 0 || (onlyHeroBlocks && headingCount >= 1 && blocks.length <= 5)) {
                return 'hero';
            }
            if (blocks.length === 1 && blocks[0].type === 'heading') {
                return 'divider';
            }
            return 'content';
        }

        function renderBlock(block) {
            if (block.type === 'heading') {
                return `<h${Math.min(block.level, 4)}>${formatInline(block.text)}</h${Math.min(block.level, 4)}>`;
            }
            if (block.type === 'paragraph') {
                const text = formatInline(block.text);
                if (/^☕/.test(block.text) || / · /.test(block.text) && block.text.length < 90) {
                    return `<div class="chips"><span class="meta-chip">${text}</span></div>`;
                }
                return `<p>${text}</p>`;
            }
            if (block.type === 'blockquote') {
                return `<div class="blockquote">${formatInline(block.text)}</div>`;
            }
            if (block.type === 'ul' || block.type === 'ol') {
                const tag = block.type;
                return `<${tag}>${block.items.map((item) => `<li>${formatInline(item)}</li>`).join('')}</${tag}>`;
            }
            if (block.type === 'table') {
                return `<div class="table-shell"><table><thead><tr>${block.header.map((cell) => `<th>${formatInline(cell)}</th>`).join('')}</tr></thead><tbody>${block.rows.map((row) => `<tr>${row.map((cell) => `<td>${formatInline(cell)}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
            }
            if (block.type === 'image') {
                return `<div class="slide-image"><img src="${block.src}" alt="${escapeHtml(block.alt)}" style="max-width:85%;max-height:55vh;margin:1.2rem auto;display:block;border-radius:8px;"></div>`;
            }
            if (block.type === 'code') {
                if (block.language === 'ssdlc-flow') {
                    return renderSsdlcFlow();
                }
                if (block.language === 'qa-accordion') {
                    return renderQaAccordion(block.content);
                }
                return `<div class="code-shell"><pre><code>${escapeHtml(block.content)}</code></pre></div>`;
            }
            return '';
        }

        function renderQaAccordion(content) {
            const items = [];
            let current = null;

            content.split('\n').forEach((line) => {
                const trimmed = line.trim();
                if (!trimmed) {
                    return;
                }
                if (trimmed.startsWith('Q:')) {
                    if (current) {
                        items.push(current);
                    }
                    current = { question: trimmed.slice(2).trim(), answers: [] };
                    return;
                }
                if (trimmed.startsWith('A:') && current) {
                    current.answers.push(trimmed.slice(2).trim());
                }
            });

            if (current) {
                items.push(current);
            }

            return `<div class="qa-accordion">${items.map((item) => `<details class="qa-item"><summary>${formatInline(item.question)}</summary><div class="qa-answer">${item.answers.map((answer) => `<p>${formatInline(answer)}</p>`).join('')}</div></details>`).join('')}</div>`;
        }

        function renderSsdlcFlow() {
            const activities = [
                { label: 'Integration of<br>security goals' },
                { label: 'Threat<br>modeling' },
                { label: 'Code review -<br>security, SAST' },
                { label: 'Penetration testing', span: 2 },
                { label: 'Monitoring' }
            ];

            const phases = ['REQUIREMENTS', 'DESIGN', 'IMPLEMENT', 'TEST', 'DEPLOY', 'MAINTAIN'];

            const activityMarkup = activities.map((activity) => {
                const spanClass = activity.span === 2 ? ' span-2' : '';
                return `<div class="ssdlc-activity${spanClass}"><div class="ssdlc-pillar"></div><div class="ssdlc-badge">${activity.label}</div><div class="ssdlc-activity-connector"></div></div>`;
            }).join('');

            const phaseMarkup = phases.map((phase, index) => {
                const arrow = index === phases.length - 1 ? 'false' : 'true';
                return `<div class="ssdlc-lifecycle-stage" data-arrow="${arrow}"><div class="ssdlc-lifecycle"><span>${phase}</span></div></div>`;
            }).join('');

            return `<div class="ssdlc-shell"><div class="ssdlc-top-grid"><div class="ssdlc-top-card risk">Risk assessment<span class="ssdlc-drop left"></span><span class="ssdlc-drop right"></span></div><div class="ssdlc-top-card vuln">Vulnerability assessments,<br>DAST, SCA<span class="ssdlc-drop center"></span></div></div><div class="ssdlc-activity-grid">${activityMarkup}</div><div class="ssdlc-lifecycle-grid">${phaseMarkup}</div></div>`;
        }

        function renderSlide(slide, index) {
            const section = document.createElement('section');
            const classes = ['slide'];
            if (index === 0) {
                classes.push('active');
            }
            if (slide.layout === 'hero' || slide.layout === 'divider') {
                classes.push('spotlight-slide');
            }
            section.className = classes.join(' ');
            section.dataset.slide = String(index + 1);

            if (slide.layout === 'divider') {
                section.innerHTML = `<div class="slide-title"><div class="divider-banner">${slide.blocks.map(renderBlock).join('')}</div></div>`;
                return section;
            }

            const wrapperClass = slide.layout === 'hero' ? 'slide-title' : 'slide-content';
            let body;

            const colBreakIdx = slide.blocks.findIndex(b => b.type === 'column-break');
            if (colBreakIdx !== -1) {
                // Separate heading blocks from content blocks
                const headingBlocks = [];
                let contentStart = 0;
                for (let i = 0; i < slide.blocks.length; i++) {
                    if (slide.blocks[i].type === 'heading') {
                        headingBlocks.push(slide.blocks[i]);
                        contentStart = i + 1;
                    } else break;
                }
                const contentBlocks = slide.blocks.slice(contentStart);
                const actualBreakIdx = contentBlocks.findIndex(b => b.type === 'column-break');
                const leftBlocks = contentBlocks.slice(0, actualBreakIdx);
                const rightBlocks = contentBlocks.slice(actualBreakIdx + 1);
                const leftHtml = leftBlocks.map(b => {
                    if (b.type === 'image') return `<img src="${b.src}" alt="${escapeHtml(b.alt)}" style="width:200px;height:200px;object-fit:cover;border-radius:50%;box-shadow:0 4px 24px rgba(0,0,0,0.4);">`;
                    return renderBlock(b);
                }).join('');
                const rightHtml = rightBlocks.map(b => {
                    if (b.type === 'heading') return `<h${b.level} style="color:var(--accent-cyan);font-size:1.8rem;margin-bottom:0.3rem;">${formatInline(b.text)}</h${b.level}>`;
                    if (b.type === 'paragraph' && /^[✉️🔗📧]/.test(b.text)) return `<p style="color:var(--accent-cyan);opacity:0.85;font-size:0.95rem;margin:0.3rem 0;">${formatInline(b.text)}</p>`;
                    return renderBlock(b);
                }).join('');
                body = headingBlocks.map(renderBlock).join('') +
                    `<div style="display:flex;align-items:center;gap:3rem;width:100%;padding:1rem 2rem;">` +
                    `<div style="flex:0 0 auto;">${leftHtml}</div>` +
                    `<div style="flex:1;text-align:left;">${rightHtml}</div>` +
                    `</div>`;
            } else {
                body = slide.blocks.map(renderBlock).join('');
            }

            if (slide.layout === 'hero') {
                body = body.replace(/<p>([^<]{1,80})<\/p>/, '<p class="lead">$1</p>');
            }

            const hasImage = slide.blocks.some(b => b.type === 'image');
            const hasColumns = slide.blocks.some(b => b.type === 'column-break');
            const centerStyle = (hasImage && !hasColumns) ? ' style="text-align:center;"' : '';

            section.innerHTML = `<div class="${wrapperClass}"${centerStyle}>${body}</div>`;
            return section;
        }

        function initializeSlides() {
            const source = document.getElementById('deck-source').textContent.trim();
            const sections = splitSections(source);
            const metadata = sections.shift();
            const slides = sections.map(parseSection);
            if (metadata) {
                document.title = metadata.split('\n')[0].replace(/^#\s*/, '').trim();
            }

            slideTitles = slides.map((slide) => slide.title);
            totalSlides = slides.length;

            const presentation = document.getElementById('presentation');
            presentation.innerHTML = '';
            slides.forEach((slide, index) => {
                presentation.appendChild(renderSlide(slide, index));
            });

            initializeMenu();
            updateNav();
        }

        function initializeMenu() {
            const menuContainer = document.getElementById('menu-items');
            menuContainer.innerHTML = '';
            slideTitles.forEach((title, index) => {
                const item = document.createElement('button');
                item.type = 'button';
                item.className = 'slide-menu-item';
                if (index === 0) item.classList.add('current');
                item.innerHTML = `<span class="slide-number">${index + 1}</span>${escapeHtml(title)}`;
                item.onclick = () => {
                    goToSlide(index + 1);
                    toggleMenu();
                };
                menuContainer.appendChild(item);
            });
        }

        function toggleMenu() {
            document.getElementById('slide-menu').classList.toggle('active');
        }

        function getThemeIconMarkup(isLightMode) {
            if (isLightMode) {
                return '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4.25"></circle><path d="M12 2.75v2.1"></path><path d="M12 19.15v2.1"></path><path d="M2.75 12h2.1"></path><path d="M19.15 12h2.1"></path><path d="M5.46 5.46l1.48 1.48"></path><path d="M17.06 17.06l1.48 1.48"></path><path d="M18.54 5.46l-1.48 1.48"></path><path d="M6.94 17.06l-1.48 1.48"></path></svg>';
            }
            return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 14.6A8.6 8.6 0 1 1 9.4 4 6.9 6.9 0 0 0 20 14.6z"></path></svg>';
        }

        function updateThemeIcon() {
            const themeIcon = document.getElementById('theme-icon');
            if (!themeIcon) return;
            themeIcon.innerHTML = getThemeIconMarkup(document.body.classList.contains('light-mode'));
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            updateThemeIcon();
        }

        function updateNav() {
            document.getElementById('current-slide').textContent = currentSlide;
            document.getElementById('total-slides').textContent = totalSlides;
            document.getElementById('prev-btn').disabled = currentSlide === 1;
            document.getElementById('next-btn').disabled = currentSlide === totalSlides;
            const progress = totalSlides > 1 ? ((currentSlide - 1) / (totalSlides - 1)) * 100 : 100;
            document.getElementById('progress-fill').style.width = `${progress}%`;
            document.querySelectorAll('.slide-menu-item').forEach((item, index) => item.classList.toggle('current', index === currentSlide - 1));
        }

        function goToSlide(number) {
            if (number < 1 || number > totalSlides || number === currentSlide) return;
            const slides = document.querySelectorAll('.slide');
            const current = slides[currentSlide - 1];
            const next = slides[number - 1];
            current.classList.remove('active');
            if (number > currentSlide) {
                current.classList.add('to-left');
            } else {
                current.classList.remove('to-left');
            }
            next.classList.remove('to-left');
            next.classList.add('active');
            currentSlide = number;
            updateNav();
        }

        function nextSlide() {
            goToSlide(currentSlide + 1);
        }

        function prevSlide() {
            goToSlide(currentSlide - 1);
        }

        document.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowRight' || event.key === 'PageDown' || event.key === ' ') nextSlide();
            if (event.key === 'ArrowLeft' || event.key === 'PageUp') prevSlide();
            if (event.key === 'Escape') document.getElementById('slide-menu').classList.remove('active');
        });

        initializeSlides();
        updateThemeIcon();
    </script>
</body>
</html>
