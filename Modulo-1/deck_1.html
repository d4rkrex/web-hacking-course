<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deck 1 · Módulo 1 · Clase 1 · Curso de Web Hacking</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #161b28;
            --border: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --accent-cyan: #06b6d4;
            --accent-fuchsia: #d946ef;
            --accent-lime: #84cc16;
            --accent-yellow: #eab308;
            --accent-rose: #f43f5e;
            --accent-emerald: #10b981;
        }

        body.light-mode {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --border: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
        }

        body.light-mode .bg-grid path { stroke: #cbd5e1; }

        body {
            background: var(--bg-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: var(--text-primary);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            user-select: none;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }

        .presentation {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .slide {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 80px 100px;
            opacity: 0;
            visibility: hidden;
            transform: translateX(80px);
            transition: opacity 0.5s ease, transform 0.5s ease, visibility 0s 0.5s;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
            background: var(--bg-primary);
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
            transform: translateX(0);
            pointer-events: auto;
            z-index: 2;
            transition: opacity 0.5s ease, transform 0.5s ease, visibility 0s 0s;
        }

        .slide.to-left {
            opacity: 0;
            transform: translateX(-80px);
            visibility: hidden;
            z-index: 0;
        }

        .slide.spotlight-slide {
            overflow: hidden;
            isolation: isolate;
        }

        .slide.spotlight-slide::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(circle at 84% 14%, rgba(132, 204, 22, 0.12), transparent 32%),
                radial-gradient(circle at 16% 82%, rgba(6, 182, 212, 0.1), transparent 36%);
        }

        .slide.spotlight-slide::after {
            content: '';
            position: absolute;
            inset: -10% -6%;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(circle at 72% 22%, rgba(217, 70, 239, 0.08), transparent 22%),
                radial-gradient(circle at 28% 76%, rgba(6, 182, 212, 0.06), transparent 26%);
            filter: blur(26px);
            opacity: 0.9;
        }

        .slide.spotlight-slide > * {
            position: relative;
            z-index: 1;
        }

        .slide-title,
        .slide-content {
            max-width: 1240px;
            width: 100%;
            max-height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .slide-content::-webkit-scrollbar,
        .slide-title::-webkit-scrollbar {
            width: 8px;
        }
        .slide-content::-webkit-scrollbar-thumb,
        .slide-title::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        /* Prevenir overflow horizontal en elementos internos */
        .slide-content > *,
        .slide-title > * {
            max-width: 100%;
            overflow-wrap: break-word;
            word-wrap: break-word;
        }

        .slide-content pre,
        .slide-content .code-shell,
        .slide-content .table-shell {
            overflow-x: auto;
            max-width: 100%;
        }

        .slide-content .slide-image {
            margin: 1.5rem 0;
        }

        .slide-title { text-align: center; }

        .slide-title h1,
        .slide-content h1 {
            font-size: clamp(42px, 5vw, 72px);
            font-weight: 800;
            line-height: 1.08;
            letter-spacing: -1px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-fuchsia));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .slide-title h2,
        .slide-content h2 {
            font-size: clamp(30px, 4vw, 52px);
            font-weight: 700;
            margin-bottom: 36px;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .slide-title h3,
        .slide-content h3 {
            font-size: clamp(20px, 2.2vw, 28px);
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--text-secondary);
        }

        .slide-content h4 {
            font-size: 18px;
            font-weight: 700;
            margin: 24px 0 12px;
            color: var(--accent-cyan);
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .eyebrow {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            margin-bottom: 24px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent-cyan);
            background: rgba(6, 182, 212, 0.08);
            border: 1px solid rgba(6, 182, 212, 0.24);
        }

        .lead,
        .slide-content p,
        .slide-title p,
        .blockquote {
            font-size: clamp(18px, 1.8vw, 24px);
            line-height: 1.7;
            color: var(--text-secondary);
            margin-bottom: 18px;
        }

        .slide-content p strong,
        .slide-title p strong,
        .blockquote strong,
        li strong,
        td strong {
            color: var(--text-primary);
            transition: all 0.1s ease-out;
            cursor: default;
            position: relative;
            padding: 2px 6px;
            margin: 0 -6px;
            border-radius: 6px;
        }

        /* Hover effect en negritas */
        .slide-content strong:hover,
        .slide-title strong:hover,
        li strong:hover,
        td strong:hover {
            color: var(--accent-cyan);
            background: rgba(6, 182, 212, 0.15);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.12);
            transform: scale(1.05);
        }

        body.light-mode .slide-content strong:hover,
        body.light-mode .slide-title strong:hover,
        body.light-mode li strong:hover {
            background: rgba(6, 182, 212, 0.12);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.08);
        }

        .blockquote {
            margin-top: 18px;
            padding: 22px 24px;
            border-radius: 16px;
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.54), rgba(15, 23, 42, 0.72));
            border: 1px solid rgba(148, 163, 184, 0.18);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 18px 40px rgba(0, 0, 0, 0.18);
        }

        body.light-mode .blockquote {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.8), rgba(248, 250, 252, 0.74));
            border: 1px solid rgba(148, 163, 184, 0.26);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9), 0 16px 30px rgba(15, 23, 42, 0.06);
        }

        .slide-content ul,
        .slide-content ol,
        .slide-title ul,
        .slide-title ol {
            padding: 0;
            margin: 10px 0 20px;
            list-style: none;
        }

        .slide-content li,
        .slide-title li {
            font-size: clamp(16px, 1.6vw, 22px);
            line-height: 1.65;
            color: var(--text-secondary);
            padding: 10px 16px 10px 40px;
            margin: 4px 0;
            position: relative;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 10px;
            cursor: default;
        }

        /* Hover effect en items de lista */
        .slide.active li:hover {
            background: rgba(6, 182, 212, 0.08);
            color: var(--text-primary);
            transform: translateX(0) scale(1.01);
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.15);
            padding-left: 46px;
            transition: all 0.15s ease-out;
        }

        .slide.active li:hover::before {
            color: var(--accent-fuchsia);
            transform: scale(1.3);
            transition: all 0.1s ease-out;
        }

        body.light-mode .slide.active li:hover {
            background: rgba(6, 182, 212, 0.06);
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.08);
        }

        .slide-content li::before,
        .slide-title li::before {
            content: '▹';
            position: absolute;
            left: 12px;
            color: var(--accent-cyan);
            font-size: 24px;
            top: 8px;
        }

        .slide-content ol { counter-reset: item; }
        .slide-content ol li::before,
        .slide-title ol li::before {
            counter-increment: item;
            content: counter(item);
            width: 24px;
            height: 24px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 800;
            background: rgba(6, 182, 212, 0.18);
            left: 8px;
            top: 12px;
        }

        .slide.active li,
        .slide.active .table-shell,
        .slide.active .code-shell,
        .slide.active .callout-card,
        .slide.active .meta-chip,
        .slide.active .divider-banner {
            opacity: 1;
            transform: translateX(0) translateY(0) scale(1);
        }

        .slide.active li:nth-child(1),
        .slide.active .callout-card:nth-child(1),
        .slide.active .meta-chip:nth-child(1) { transition-delay: 0.08s; }
        .slide.active li:nth-child(2),
        .slide.active .callout-card:nth-child(2),
        .slide.active .meta-chip:nth-child(2) { transition-delay: 0.16s; }
        .slide.active li:nth-child(3),
        .slide.active .callout-card:nth-child(3),
        .slide.active .meta-chip:nth-child(3) { transition-delay: 0.24s; }
        .slide.active li:nth-child(4),
        .slide.active .callout-card:nth-child(4),
        .slide.active .meta-chip:nth-child(4) { transition-delay: 0.32s; }
        .slide.active li:nth-child(5) { transition-delay: 0.4s; }

        .table-shell,
        .code-shell,
        .callout-card,
        .divider-banner,
        .meta-chip {
            opacity: 0;
            transform: translateY(18px);
            transition: all 0.45s ease;
        }

        .table-shell,
        .code-shell,
        .callout-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            margin: 24px 0;
            box-shadow: 0 16px 34px rgba(2, 6, 23, 0.18);
        }

        .table-shell::before,
        .code-shell::before,
        .callout-card::before {
            content: '';
            display: block;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-fuchsia));
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 16px 18px;
            text-align: left;
            border-bottom: 1px solid rgba(148, 163, 184, 0.12);
            vertical-align: top;
            transition: all 0.12s ease-out;
        }

        /* Hover effect en filas de tabla */
        tbody tr:hover td {
            background: rgba(6, 182, 212, 0.05);
            color: var(--text-primary);
        }

        tbody tr:hover td:first-child {
            color: var(--accent-cyan);
            transform: translateX(4px);
        }

        body.light-mode tbody tr:hover td {
            background: rgba(6, 182, 212, 0.04);
        }

        th {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--text-muted);
            background: rgba(15, 23, 42, 0.42);
        }

        td {
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        td:first-child { color: var(--text-primary); font-weight: 700; }

        pre {
            padding: 20px 22px;
            overflow-x: auto;
            background: #0d1117;
            color: #9ae6b4;
            font-size: 16px;
            line-height: 1.65;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
        }

        code.inline-code {
            padding: 2px 8px;
            border-radius: 999px;
            background: rgba(6, 182, 212, 0.12);
            color: var(--accent-cyan);
            font-size: 0.9em;
            font-family: 'Courier New', monospace;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 22px 0 10px;
        }

        .meta-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 999px;
            background: rgba(6, 182, 212, 0.08);
            border: 1px solid rgba(6, 182, 212, 0.24);
            color: var(--accent-cyan);
            font-size: 14px;
            line-height: 1.3;
        }

        .divider-banner {
            width: 100%;
            padding: 28px 32px;
            border-radius: 24px;
            text-align: center;
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.16), rgba(217, 70, 239, 0.16));
            border: 1px solid rgba(6, 182, 212, 0.18);
            box-shadow: 0 22px 40px rgba(2, 6, 23, 0.16);
        }

        .divider-banner h1,
        .divider-banner h2,
        .divider-banner h3,
        .divider-banner p {
            margin-bottom: 0;
        }

        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(6, 182, 212, 0.2);
            z-index: 1000;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-fuchsia));
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
        }

        .menu-btn {
            position: fixed;
            top: 18px;
            left: 18px;
            width: 42px;
            height: 42px;
            background: rgba(15, 23, 42, 0.58);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 999px;
            cursor: pointer;
            z-index: 1001;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 12px 28px rgba(0, 0, 0, 0.18);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1), border-color 0.35s ease, background 0.35s ease;
        }

        .menu-btn:hover {
            transform: translateY(-1px);
            border-color: rgba(6, 182, 212, 0.28);
            background: rgba(15, 23, 42, 0.72);
        }

        body.light-mode .menu-btn {
            background: rgba(255, 255, 255, 0.82);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9), 0 12px 24px rgba(15, 23, 42, 0.08);
        }

        .menu-btn span {
            width: 15px;
            height: 1.5px;
            background: rgba(241, 245, 249, 0.88);
            border-radius: 999px;
        }

        body.light-mode .menu-btn span { background: rgba(15, 23, 42, 0.78); }

        .slide-menu {
            position: fixed;
            top: 0;
            left: -360px;
            width: 360px;
            height: 100vh;
            background: var(--bg-secondary);
            border-right: 2px solid var(--accent-cyan);
            z-index: 1000;
            overflow-y: auto;
            transition: left 0.3s ease;
            padding: 90px 20px 20px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        .slide-menu.active { left: 0; }

        .slide-menu h3 {
            color: var(--accent-cyan);
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            padding-left: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .slide-menu-item {
            padding: 14px 10px;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 6px;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            font-size: 14px;
            line-height: 1.4;
            color: var(--text-secondary);
        }

        .slide-menu-item:hover,
        .slide-menu-item.current {
            background: rgba(6, 182, 212, 0.1);
            border-left-color: var(--accent-cyan);
            color: var(--text-primary);
        }

        .slide-menu-item .slide-number {
            display: inline-block;
            min-width: 32px;
            color: var(--accent-cyan);
            font-weight: 700;
            margin-right: 10px;
        }

        .theme-toggle {
            position: fixed;
            top: 18px;
            right: 18px;
            width: 42px;
            height: 42px;
            background: rgba(15, 23, 42, 0.58);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 999px;
            cursor: pointer;
            z-index: 1001;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(241, 245, 249, 0.82);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 12px 28px rgba(0, 0, 0, 0.18);
        }

        .theme-toggle:hover {
            border-color: rgba(217, 70, 239, 0.24);
            color: rgba(248, 250, 252, 0.96);
            background: rgba(15, 23, 42, 0.72);
        }

        body.light-mode .theme-toggle {
            background: rgba(255, 255, 255, 0.82);
            color: rgba(15, 23, 42, 0.76);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9), 0 12px 24px rgba(15, 23, 42, 0.08);
        }

        #theme-icon {
            width: 16px;
            height: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        #theme-icon svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.65;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .slide-counter {
            position: fixed;
            bottom: 34px;
            left: 34px;
            color: var(--text-muted);
            z-index: 100;
            font-size: 14px;
            font-weight: 600;
        }

        .slide-counter .current { font-size: 28px; color: var(--accent-cyan); font-weight: 800; }

        .nav-controls {
            position: fixed;
            bottom: 34px;
            right: 34px;
            display: flex;
            gap: 12px;
            z-index: 100;
        }

        .nav-btn {
            padding: 12px 30px;
            border-radius: 12px;
            background: var(--bg-card);
            border: 1px solid rgba(6, 182, 212, .28);
            color: var(--accent-cyan);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .nav-btn:disabled { opacity: .3; cursor: not-allowed; }

        .placeholder-link {
            color: var(--accent-fuchsia);
            font-weight: 600;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 1200px) {
            .slide { padding: 82px 28px 138px; }
            .slide-content,
            .slide-title { max-width: 100%; }
            .slide-menu {
                width: min(88vw, 360px);
                left: calc(-1 * min(88vw, 360px));
            }
        }
    </style>
</head>

## ¿Qué analizamos en seguridad web?

- **Datos** → ¿quién accede? ¿cómo se almacenan? ¿viajan protegidos?
- **Funciones** → ¿se puede abusar la lógica de negocio?
- **Infraestructura** → ¿qué expone el servidor? ¿está actualizado?
- **Clientes** → ¿el navegador confía en input malicioso?

Todo sitio web es una superficie de ataque. Nuestro trabajo es mapearla.

## El proceso de análisis web

```
    🔍                 📡                 🗂️              🎯
Comprensión   →   Reconocimiento   →   Enumeración   →   Detección
```

| Fase | ¿Qué hacés? | Ejemplo |
|---|---|---|
| 🔍 Comprensión | Entender stack, lógica, flujos | "Es un SPA con API REST en Node" |
| 📡 Reconocimiento | Info pública y semi-pública | WhatWeb, Wappalyzer, headers |
| 🗂️ Enumeración | Fuerza bruta controlada | Gobuster, Nmap, fuzzing |
| 🎯 Detección | Identificar vulns concretas | Nikto, pruebas manuales |

> 👉 **Hoy cubrimos las fases 1–3.** La detección arranca en la clase 2.

---

## Triada CIA

| Pilar | Significado | Ejemplo de falla |
|---|---|---|
| **Confidencialidad** | Solo lo ven quienes deben | `/api/users` devuelve correos sin auth → fuga |
| **Integridad** | Datos no se alteran sin permiso | `price=10` → `price=1` aceptado → fraude |
| **Disponibilidad** | El servicio responde cuando se necesita | Endpoint sin rate-limit → DoS |

Cada vulnerabilidad que encontremos impacta al menos uno de estos pilares.

---

## Autenticación vs Autorización

| Concepto | Pregunta que responde | Falla típica |
|---|---|---|
| **Autenticación** | ¿Quién sos? | Credenciales débiles, fuerza bruta |
| **Autorización** | ¿Qué podés hacer? | IDOR, privilege escalation |

---

## IDOR — Ejemplo clásico

```
GET /api/orders/1001   ← tu pedido
GET /api/orders/1002   ← pedido de otro usuario
```

Si el servidor no valida que el usuario autenticado sea dueño del recurso → **Insecure Direct Object Reference**.

El usuario está autenticado, pero **no autorizado** para ese objeto.

---

## Sesiones y cookies

El protocolo HTTP es **stateless**. Para mantener sesión usamos cookies:

```
Set-Cookie: session=abc123; HttpOnly; Secure; SameSite=Strict
```

| Flag | Protege contra |
|---|---|
| `HttpOnly` | Robo de cookie vía XSS (JavaScript no puede leerla) |
| `Secure` | Envío por HTTP plano (solo viaja por HTTPS) |
| `SameSite=Strict` | CSRF (no se envía en requests cross-origin) |

---

## ¿Qué pasa si faltan esos flags?

- Sin `HttpOnly` → un XSS roba la sesión con `document.cookie`
- Sin `Secure` → un MITM en red WiFi captura la cookie
- Sin `SameSite` → un sitio malicioso hace requests en tu nombre (CSRF)

Siempre revisamos los headers de cookies como parte del reconocimiento.

---

## Anatomía HTTP — Request

```http
GET /api/products HTTP/1.1
Host: juice.labs.manuel-roldan.cloud
Cookie: session=abc123
Accept: application/json
```

Componentes clave:
- **Método**: GET, POST, PUT, DELETE, PATCH, OPTIONS
- **Path**: el recurso solicitado
- **Headers**: metadatos (auth, content-type, cookies)
- **Body** (en POST/PUT): datos enviados

---

## Anatomía HTTP — Response

```http
HTTP/1.1 200 OK
Content-Type: application/json
X-Frame-Options: DENY
Set-Cookie: session=xyz; HttpOnly

{"products": [...]}
```

Lo que nos interesa: status code, headers de seguridad, body.

---

## Códigos de estado que nos importan

| Código | Significado | Para nosotros |
|---|---|---|
| **200** | OK | El recurso existe y respondió |
| **301/302** | Redirect | ¿A dónde redirige? ¿Hay open redirect? |
| **401** | No autenticado | Existe pero necesita credenciales |
| **403** | Prohibido | Existe, tenemos auth pero no permiso |
| **404** | No encontrado | No existe (o lo ocultan) |
| **500** | Error interno | Posible input no sanitizado, crash |

---

## HTTPS y TLS

**¿Qué protege?**
- Confidencialidad del tránsito (cifrado entre cliente y servidor)
- Integridad (no se puede alterar en el camino)
- Autenticidad del servidor (certificado válido)

**¿Qué NO protege?**
- Vulnerabilidades en la aplicación
- Ataques del lado del servidor
- Un atacante con acceso al servidor
- Phishing con certificado válido (sí, Let's Encrypt da certs a cualquiera)

## Security Headers

Headers HTTP que el servidor envía para instruir al navegador:

| Header | Qué hace |
|---|---|
| `Content-Security-Policy` | Controla de dónde se cargan scripts, estilos, imágenes |
| `Strict-Transport-Security` | Fuerza HTTPS (evita downgrade) |
| `X-Frame-Options` | Previene clickjacking (DENY / SAMEORIGIN) |
| `X-Content-Type-Options` | Evita MIME sniffing (`nosniff`) |

---

## ¿Por qué nos importan los headers?

- Si falta `CSP` → XSS es más fácil de explotar
- Si falta `HSTS` → posible downgrade a HTTP
- Si falta `X-Frame-Options` → clickjacking viable
- Si falta `X-Content-Type-Options` → el browser interpreta archivos como scripts

En reconocimiento siempre chequeamos qué headers están (y cuáles faltan).

## 🧪 WhatWeb — Escaneo básico

```bash
whatweb https://juice.labs.manuel-roldan.cloud

Esto nos da un resumen rápido: servidor web, framework, cookies, headers.

## 🧪 WhatWeb — Modo verbose

```bash
whatweb -v https://juice.labs.manuel-roldan.cloud
```

Más detalle: versiones específicas, plugins detectados, información del certificado.

## 🧪 WhatWeb — Agresividad nivel 3

```bash
whatweb -a 3 https://juice.labs.manuel-roldan.cloud
```

Nivel de agresividad:
- **1** (default): un solo request
- **3**: hace requests adicionales para confirmar tecnologías
- **4**: heavy (intrusivo, más requests)

En un pentest real, `-a 3` es razonable para la fase de reconocimiento.

## Reconocimiento pasivo — Sin tocar el target

No generás logs, no alertás al blue team. Solo usás info pública.

- **Google Dorks**: buscar archivos expuestos, paneles admin, leaks
- **DNS** (`dig`, `nslookup`): subdominios, registros MX, TXT
- **WHOIS**: quién registró el dominio, fechas, nameservers
- **Shodan / Censys**: qué puertos/servicios se ven desde internet
- **theHarvester**: emails, subdominios, IPs asociadas

> 💡 Si no tocaste el servidor, no dejaste rastro.

## 🧪 Google Dorks — Ejemplos

| Dork | ¿Qué busca? |
|---|---|
| `site:target.com filetype:pdf` | Documentos PDF públicos |
| `site:target.com inurl:admin` | Paneles de administración |
| `site:target.com ext:sql OR ext:env` | Archivos de config/DB expuestos |
| `"index of" site:target.com` | Directory listing habilitado |
| `intext:"password" site:target.com` | Páginas con credenciales |

> 🎯 Probalo en vivo: `site:educacionit.com`

## Reconocimiento: pasivo vs activo

| | Pasivo | Activo |
|---|---|---|
| **Qué es** | Recopilar info sin tocar el target | Interactuar directamente con el target |
| **Riesgo de detección** | Nulo | Medio-alto |
| **Profundidad** | Superficial | Mayor |
| **Ejemplos** | WHOIS, Google dorks, DNS público, GitHub | Port scan, directory bruteforce, crawling |

En un engagement real: siempre empezamos pasivo, luego activo según el scope.

---

## Pasivo vs Activo — Resumen

### 🟢 Pasivo

- **Interacción:** Ninguna con el target
- **Detección:** Imposible
- **Herramientas:** Google, dig, whois, Shodan
- **Legalidad:** Siempre OK

|||

### 🔴 Activo

- **Interacción:** Directa con el target
- **Detección:** Posible (logs, WAF)
- **Herramientas:** whatweb, nmap, gobuster
- **Legalidad:** Requiere autorización

            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');

        function splitSections(source) {
            return source
                .split(/^---\s*$/m)
                .map((section) => section.trim())
                .filter(Boolean);

        function normalizeTitle(text) {
            return text
                .replace(/^Slide\s+\d+\s+[—-]\s+/i, '')
                .replace(/^#+\s*/, '')
                .trim();
        }

        function parseSection(section, index) {
            const lines = section.split('\n');
            const blocks = [];
            let pointer = 0;
            let slideLabel = '';

            while (pointer < lines.length) {
                const line = lines[pointer];
                const trimmed = line.trim();

                if (!trimmed) {
                    pointer += 1;
                    continue;
                }

                const headingMatch = trimmed.match(/^(#{1,6})\s+(.+)$/);
                if (headingMatch) {
                    const level = headingMatch[1].length;
                    let text = headingMatch[2].trim();
                    if (!slideLabel && level <= 2) {
                        slideLabel = normalizeTitle(text);
                        text = slideLabel;
                    }
                    blocks.push({ type: 'heading', level, text });
                    pointer += 1;
                    continue;
                }

                if (trimmed.startsWith('```')) {
                    const language = trimmed.slice(3).trim();
                    pointer += 1;
                    const codeLines = [];
                    while (pointer < lines.length && !lines[pointer].trim().startsWith('```')) {
                        codeLines.push(lines[pointer]);
                        pointer += 1;
                    }
                    pointer += 1;
                    blocks.push({ type: 'code', language, content: codeLines.join('\n') });
                    continue;
                }

                if (trimmed === '|||') {
                    blocks.push({ type: 'column-break' });
                    pointer += 1;
                    continue;
                }

                if (trimmed.startsWith('|')) {
                    const tableLines = [];
                    while (pointer < lines.length && lines[pointer].trim().startsWith('|')) {
                        tableLines.push(lines[pointer].trim());
                        pointer += 1;
                    }
                    blocks.push(parseTable(tableLines));
                    continue;
                }

                if (trimmed.startsWith('>')) {
                    const quoteLines = [];
                    while (pointer < lines.length && lines[pointer].trim().startsWith('>')) {
                        quoteLines.push(lines[pointer].trim().replace(/^>\s?/, ''));
                        pointer += 1;
                    }
                    blocks.push({ type: 'blockquote', text: quoteLines.join(' ') });
                    continue;
                }

                if (trimmed.startsWith('![')) {
                    const altEnd = trimmed.indexOf('](');
                    if (altEnd !== -1 && trimmed.endsWith(')')) {
                        const alt = trimmed.slice(2, altEnd);
                        const src = trimmed.slice(altEnd + 2, -1);
                        blocks.push({ type: 'image', alt, src });
                        pointer += 1;
                        continue;

                if (/^(?:[-*+]\s+|\d+\.\s+)/.test(trimmed)) {

                    const items = [];
                    while (pointer < lines.length && /^(?:[-*+]\s+|\d+\.\s+)/.test(lines[pointer].trim())) {
                        items.push(lines[pointer].trim().replace(/^(?:[-*+]\s+|\d+\.\s+)/, ''));
                        pointer += 1;
                    }
                    blocks.push({ type: ordered ? 'ol' : 'ul', items });
                    continue;
                }

                const paragraphLines = [];
                while (pointer < lines.length) {
                    const current = lines[pointer];
                    const currentTrimmed = current.trim();
                    if (!currentTrimmed) {
                        pointer += 1;
                        break;
                    }
                    if (/^(#{1,6})\s+/.test(currentTrimmed) || currentTrimmed.startsWith('```') || currentTrimmed.startsWith('|') || currentTrimmed.startsWith('>') || currentTrimmed.startsWith('![') || /^(?:[-*+]\s+|\d+\.\s+)/.test(currentTrimmed)) {
                        break;
                    }

                    pointer += 1;

            const layout = detectLayout(blocks, index);

        function parseTable(lines) {
            const rows = lines.map((line) => line.slice(1, -1).split('|').map((cell) => cell.trim()));
            const header = rows[0] || [];

        function detectLayout(blocks, index) {

            const onlyHeroBlocks = [...contentTypes].every((type) => ['heading', 'paragraph', 'blockquote'].includes(type));
            const headingCount = blocks.filter((block) => block.type === 'heading').length;
            if (index === 0 || (onlyHeroBlocks && headingCount >= 1 && blocks.length <= 5)) {
                return 'hero';
            }
            if (blocks.length === 1 && blocks[0].type === 'heading') {
                return 'divider';
            }
            return 'content';
        }

        function renderBlock(block) {
            if (block.type === 'heading') {
                return `<h${Math.min(block.level, 4)}>${formatInline(block.text)}</h${Math.min(block.level, 4)}>`;
            }
            if (block.type === 'paragraph') {
                const text = formatInline(block.text);
                if (/^☕/.test(block.text) || / · /.test(block.text) && block.text.length < 90) {
                    return `<div class="chips"><span class="meta-chip">${text}</span></div>`;
                }
                return `<p>${text}</p>`;
            }
            if (block.type === 'blockquote') {
                return `<div class="blockquote">${formatInline(block.text)}</div>`;
            }
            if (block.type === 'ul' || block.type === 'ol') {
                const tag = block.type;
                return `<${tag}>${block.items.map((item) => `<li>${formatInline(item)}</li>`).join('')}</${tag}>`;
            }
            if (block.type === 'table') {
                return `<div class="table-shell"><table><thead><tr>${block.header.map((cell) => `<th>${formatInline(cell)}</th>`).join('')}</tr></thead><tbody>${block.rows.map((row) => `<tr>${row.map((cell) => `<td>${formatInline(cell)}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
            }
            if (block.type === 'image') {
                return `<div class="slide-image"><img src="${block.src}" alt="${escapeHtml(block.alt)}" style="max-width:85%;max-height:55vh;margin:1.2rem auto;display:block;border-radius:8px;"></div>`;
            }
            if (block.type === 'code') {
                return `<div class="code-shell"><pre><code>${escapeHtml(block.content)}</code></pre></div>`;
            }
            return '';
        }

        function renderSlide(slide, index) {
            const section = document.createElement('section');
            const classes = ['slide'];
            if (index === 0) {
                classes.push('active');
            }
            if (slide.layout === 'hero' || slide.layout === 'divider') {
                classes.push('spotlight-slide');
            }
            section.className = classes.join(' ');
            section.dataset.slide = String(index + 1);

            if (slide.layout === 'divider') {
                section.innerHTML = `<div class="slide-title"><div class="divider-banner">${slide.blocks.map(renderBlock).join('')}</div></div>`;
                return section;
            }

            const wrapperClass = slide.layout === 'hero' ? 'slide-title' : 'slide-content';
            let body;

            const colBreakIdx = slide.blocks.findIndex(b => b.type === 'column-break');
            if (colBreakIdx !== -1) {
                // Separate heading blocks from content blocks
                const headingBlocks = [];
                let contentStart = 0;
                for (let i = 0; i < slide.blocks.length; i++) {
                    if (slide.blocks[i].type === 'heading') {
                        headingBlocks.push(slide.blocks[i]);
                        contentStart = i + 1;
                    } else break;
                }
                const contentBlocks = slide.blocks.slice(contentStart);
                const actualBreakIdx = contentBlocks.findIndex(b => b.type === 'column-break');
                const leftBlocks = contentBlocks.slice(0, actualBreakIdx);
                const rightBlocks = contentBlocks.slice(actualBreakIdx + 1);
                const leftHtml = leftBlocks.map(b => {
                    if (b.type === 'image') return `<img src="${b.src}" alt="${escapeHtml(b.alt)}" style="width:200px;height:200px;object-fit:cover;border-radius:50%;box-shadow:0 4px 24px rgba(0,0,0,0.4);">`;
                    return renderBlock(b);
                }).join('');
                const rightHtml = rightBlocks.map(b => {
                    if (b.type === 'heading') return `<h${b.level} style="color:var(--accent-cyan);font-size:1.8rem;margin-bottom:0.3rem;">${formatInline(b.text)}</h${b.level}>`;
                    if (b.type === 'paragraph' && /^[✉️🔗📧]/.test(b.text)) return `<p style="color:var(--accent-cyan);opacity:0.85;font-size:0.95rem;margin:0.3rem 0;">${formatInline(b.text)}</p>`;
                    return renderBlock(b);
                }).join('');
                body = headingBlocks.map(renderBlock).join('') +
                    `<div style="display:flex;align-items:center;gap:3rem;width:100%;padding:1rem 2rem;">` +
                    `<div style="flex:0 0 auto;">${leftHtml}</div>` +
                    `<div style="flex:1;text-align:left;">${rightHtml}</div>` +
                    `</div>`;
            } else {
                body = slide.blocks.map(renderBlock).join('');
            }

            if (slide.layout === 'hero') {
                body = body.replace(/<p>([^<]{1,80})<\/p>/, '<p class="lead">$1</p>');
            }

            const hasImage = slide.blocks.some(b => b.type === 'image');
            const hasColumns = slide.blocks.some(b => b.type === 'column-break');
            const centerStyle = (hasImage && !hasColumns) ? ' style="text-align:center;"' : '';

            section.innerHTML = `<div class="${wrapperClass}"${centerStyle}>${body}</div>`;
            return section;
        }

        function initializeSlides() {
            const source = document.getElementById('deck-source').textContent.trim();
            const sections = splitSections(source);
            const metadata = sections.shift();
            const slides = sections.map(parseSection);
            if (metadata) {
                document.title = metadata.split('\n')[0].replace(/^#\s*/, '').trim();
            }

            slideTitles = slides.map((slide) => slide.title);
            totalSlides = slides.length;

            const presentation = document.getElementById('presentation');
            presentation.innerHTML = '';
            slides.forEach((slide, index) => {
                presentation.appendChild(renderSlide(slide, index));
            });

            initializeMenu();
            updateNav();
        }

        function initializeMenu() {
            const menuContainer = document.getElementById('menu-items');
            menuContainer.innerHTML = '';
            slideTitles.forEach((title, index) => {
                const item = document.createElement('button');
                item.type = 'button';
                item.className = 'slide-menu-item';
                if (index === 0) item.classList.add('current');
                item.innerHTML = `<span class="slide-number">${index + 1}</span>${escapeHtml(title)}`;
                item.onclick = () => {
                    goToSlide(index + 1);
                    toggleMenu();
                };
                menuContainer.appendChild(item);
            });
        }

        function toggleMenu() {
            document.getElementById('slide-menu').classList.toggle('active');
        }

        function getThemeIconMarkup(isLightMode) {
            if (isLightMode) {
                return '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4.25"></circle><path d="M12 2.75v2.1"></path><path d="M12 19.15v2.1"></path><path d="M2.75 12h2.1"></path><path d="M19.15 12h2.1"></path><path d="M5.46 5.46l1.48 1.48"></path><path d="M17.06 17.06l1.48 1.48"></path><path d="M18.54 5.46l-1.48 1.48"></path><path d="M6.94 17.06l-1.48 1.48"></path></svg>';
            }
            return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 14.6A8.6 8.6 0 1 1 9.4 4 6.9 6.9 0 0 0 20 14.6z"></path></svg>';
        }

        function updateThemeIcon() {
            const themeIcon = document.getElementById('theme-icon');
            if (!themeIcon) return;
            themeIcon.innerHTML = getThemeIconMarkup(document.body.classList.contains('light-mode'));
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            updateThemeIcon();
        }

        function updateNav() {
            document.getElementById('current-slide').textContent = currentSlide;
            document.getElementById('total-slides').textContent = totalSlides;
            document.getElementById('prev-btn').disabled = currentSlide === 1;
            document.getElementById('next-btn').disabled = currentSlide === totalSlides;
            const progress = totalSlides > 1 ? ((currentSlide - 1) / (totalSlides - 1)) * 100 : 100;
            document.getElementById('progress-fill').style.width = `${progress}%`;
            document.querySelectorAll('.slide-menu-item').forEach((item, index) => item.classList.toggle('current', index === currentSlide - 1));
        }

        function goToSlide(number) {
            if (number < 1 || number > totalSlides || number === currentSlide) return;
            const slides = document.querySelectorAll('.slide');
            const current = slides[currentSlide - 1];
            const next = slides[number - 1];
            current.classList.remove('active');
            if (number > currentSlide) {
                current.classList.add('to-left');
            } else {
                current.classList.remove('to-left');
            }
            next.classList.remove('to-left');
            next.classList.add('active');
            currentSlide = number;
            updateNav();
        }

        function nextSlide() {
            goToSlide(currentSlide + 1);
        }

        function prevSlide() {
            goToSlide(currentSlide - 1);
        }

        document.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowRight' || event.key === 'PageDown' || event.key === ' ') nextSlide();
            if (event.key === 'ArrowLeft' || event.key === 'PageUp') prevSlide();
            if (event.key === 'Escape') document.getElementById('slide-menu').classList.remove('active');
        });

        initializeSlides();
        updateThemeIcon();
    </script>
</body>
</html>
